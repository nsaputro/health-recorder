name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (must match ha-addon/NEXT_VERSION, without 'v' prefix, e.g. 0.3.0)"
        required: true
        default: "0.1.0"

permissions:
  contents: write    # create GitHub release + push tag + commit config.yaml
  packages: write    # push to ghcr.io

jobs:
  # ── Guard: validate, write config.yaml, tag ──────────────────────────────────
  prepare-release:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version against NEXT_VERSION
        id: ver
        run: |
          VERSION="${{ inputs.version }}"
          NEXT=$(cat ha-addon/NEXT_VERSION | tr -d '[:space:]')

          echo "Requested version : $VERSION"
          echo "NEXT_VERSION file : $NEXT"

          if [ "$VERSION" != "$NEXT" ]; then
            echo "::error::Requested version ($VERSION) does not match ha-addon/NEXT_VERSION ($NEXT)."
            echo "::error::Update ha-addon/NEXT_VERSION before releasing."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"    >> "$GITHUB_OUTPUT"

      - name: Write version into config.yaml and commit to main
        run: |
          VERSION="${{ steps.ver.outputs.version }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stamp the release version into config.yaml
          sed -i "s/^version:.*/version: \"${VERSION}\"/" ha-addon/config.yaml

          git add ha-addon/config.yaml
          git commit -m "chore: release v${VERSION} — stamp config.yaml"
          git push origin HEAD:main

          # Tag the release commit and push
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

  # ── Build & push one image per architecture ───────────────────────────────────
  build-and-push:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            base: ghcr.io/home-assistant/amd64-base-python:3.12-alpine3.20
            platform: linux/amd64
          - arch: aarch64
            base: ghcr.io/home-assistant/aarch64-base-python:3.12-alpine3.20
            platform: linux/arm64

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ha-addon
          push: true
          platforms: ${{ matrix.platform }}
          build-args: |
            BUILD_FROM=${{ matrix.base }}
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.arch }}-health_recorder:${{ needs.prepare-release.outputs.version }}
            ghcr.io/${{ github.repository }}/${{ matrix.arch }}-health_recorder:latest
          labels: |
            org.opencontainers.image.title=Health Recorder (${{ matrix.arch }})
            org.opencontainers.image.description=Personal health data recorder — HA addon
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.prepare-release.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/${{ matrix.arch }}-health_recorder:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/${{ matrix.arch }}-health_recorder:cache,mode=max

  # ── Create GitHub release ─────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare-release, build-and-push]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          gh release create "${TAG}" \
            --title "Health Recorder v${VERSION}" \
            --generate-notes \
            --notes-start-tag "$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -n1)" \
            --verify-tag || \
          gh release create "${TAG}" \
            --title "Health Recorder v${VERSION}" \
            --generate-notes \
            --verify-tag

      - name: Append install instructions to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          BODY=$(gh release view "${TAG}" --json body -q .body)
          gh release edit "${TAG}" --notes "${BODY}

          ---

          ## 🏠 Installation (Home Assistant)

          1. Go to **Settings → Add-ons → Store → ⋮ → Repositories**
          2. Add: \`https://github.com/${REPO}\`
          3. Install **Health Recorder** and start it
          4. The **Health** panel appears in your HA sidebar

          ## 🐳 Pre-built Docker images (ghcr.io)

          | Architecture | Image |
          |---|---|
          | amd64   | \`ghcr.io/${REPO}/amd64-health_recorder:${VERSION}\`   |
          | aarch64 | \`ghcr.io/${REPO}/aarch64-health_recorder:${VERSION}\` |

          ## 🖥️ Standalone (Docker Compose)

          \`\`\`bash
          git clone https://github.com/${REPO}
          cd health-recorder
          cp backend/.env.example backend/.env   # add Google credentials
          docker compose up --build
          # Frontend: http://localhost:5173
          # Backend API: http://localhost:8000/docs
          \`\`\`"
