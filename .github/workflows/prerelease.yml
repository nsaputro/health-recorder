name: Pre-Release

on:
  workflow_dispatch:

permissions:
  contents: write    # push tag + create GitHub release
  packages: write    # push to ghcr.io

jobs:
  # ── Read version from ha-addon-dev/config.yaml and validate ───────────────────
  check-version:
    name: Check version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Read and validate version
        id: ver
        run: |
          VERSION=$(python3 -c "import yaml; print(yaml.safe_load(open('ha-addon-dev/config.yaml'))['version'])")
          echo "ha-addon-dev version: $VERSION"

          # Must have a pre-release suffix — pure X.Y.Z goes through Release workflow
          if echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::$VERSION is a stable version. Use the Release workflow, or add a pre-release suffix (b1, rc1, etc.) to ha-addon-dev/config.yaml."
            exit 1
          fi

          # Fail if this tag already exists (already released)
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q .; then
            echo "::error::v${VERSION} is already released. Bump the version in ha-addon-dev/config.yaml."
            exit 1
          fi

          # Tag the current commit
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"    >> "$GITHUB_OUTPUT"

  # ── Build & push one image per architecture (version tag only, no :latest) ────
  build-and-push:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: check-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            base: ghcr.io/home-assistant/amd64-base-python:3.12-alpine3.20
            platform: linux/amd64
          - arch: aarch64
            base: ghcr.io/home-assistant/aarch64-base-python:3.12-alpine3.20
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-version.outputs.tag }}

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (pre-release tag only — :latest is never touched)
        uses: docker/build-push-action@v6
        with:
          context: ha-addon
          push: true
          platforms: ${{ matrix.platform }}
          build-args: |
            BUILD_FROM=${{ matrix.base }}
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.arch }}-health_recorder:${{ needs.check-version.outputs.version }}
          labels: |
            org.opencontainers.image.title=Health Recorder (${{ matrix.arch }}) pre-release
            org.opencontainers.image.description=Developer pre-release — not for production
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.check-version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/${{ matrix.arch }}-health_recorder:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/${{ matrix.arch }}-health_recorder:cache,mode=max

  # ── Create GitHub pre-release ─────────────────────────────────────────────────
  github-prerelease:
    name: Create GitHub Pre-Release
    runs-on: ubuntu-latest
    needs: [check-version, build-and-push]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-version.outputs.tag }}

      - name: Publish pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.version }}
          TAG: ${{ needs.check-version.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          cat > /tmp/notes.md << EOF
          ## Pre-release ${TAG}

          This is a **developer pre-release** for testing before the stable release.
          Regular users will not see this as an available update.

          ### Install in Home Assistant (dev channel)

          1. Go to **Settings → Add-ons → Add-on Store → ⋮ → Repositories**
          2. Add: \`https://github.com/${REPO}\`
             *(if already added for the stable addon, skip this step)*
          3. Find **Health Recorder (dev)** → **Install** → **Start**
          4. The **Health (dev)** panel appears in your sidebar

          The dev addon (\`health_recorder_dev\`) runs on port **8100** and can run
          **alongside** the stable addon without any conflicts.

          For the Google OAuth callback use:
          \`http://<your-ha-ip>:8100/auth/google/callback\`

          ### Pre-built images

          | Architecture | Image |
          |---|---|
          | amd64   | \`ghcr.io/${REPO}/amd64-health_recorder:${VERSION}\`   |
          | aarch64 | \`ghcr.io/${REPO}/aarch64-health_recorder:${VERSION}\` |
          EOF

          gh release create "${TAG}" \
            --title "Health Recorder ${TAG} (pre-release)" \
            --prerelease \
            --notes-file /tmp/notes.md \
            --verify-tag
