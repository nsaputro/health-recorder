name: CI

on:
  push:
    branches:
      - main
      - dev
      - "claude/**"
      - "feature/**"
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint YAML files
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: ha-addon/config.yaml ha-addon/build.yaml ha-addon-dev/config.yaml
          config_file: .yamllint.yml

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: ha-addon/Dockerfile
          ignore: DL3018,DL3013   # apk/pip --no-cache warnings suppressed

      - name: Validate addon config.yaml files
        run: |
          python3 - <<'EOF'
          import yaml, sys, re

          def ver_tuple(v):
              """Parse the MAJOR.MINOR.PATCH prefix of a version string into a tuple."""
              m = re.match(r"(\d+)\.(\d+)\.(\d+)", v)
              return tuple(int(x) for x in m.groups()) if m else (0, 0, 0)

          configs = ["ha-addon/config.yaml", "ha-addon-dev/config.yaml"]
          required = ["name", "description", "version", "slug", "arch", "init"]
          ok = True
          versions = {}
          for path in configs:
              with open(path) as f:
                  cfg = yaml.safe_load(f)
              missing = [k for k in required if k not in cfg]
              if missing:
                  print(f"ERROR: {path} missing required keys: {missing}")
                  ok = False
              else:
                  versions[path] = cfg["version"]
                  print(f"{path} OK — version {cfg['version']}, slug {cfg['slug']}")

          # Cross-file invariants (only checked when NEXT_VERSION exists)
          try:
              next_ver = open("ha-addon/NEXT_VERSION").read().strip()
          except FileNotFoundError:
              next_ver = None

          if next_ver:
              print(f"ha-addon/NEXT_VERSION : {next_ver}")
              released = versions.get("ha-addon/config.yaml", "")
              dev      = versions.get("ha-addon-dev/config.yaml", "")

              if released and ver_tuple(next_ver) <= ver_tuple(released):
                  print(f"ERROR: NEXT_VERSION ({next_ver}) must be greater than "
                        f"config.yaml released version ({released})")
                  ok = False
              else:
                  print(f"Version ordering OK: released={released} < next={next_ver}")

              if dev and not dev.startswith(next_ver):
                  print(f"ERROR: ha-addon-dev version ({dev}) must start with NEXT_VERSION ({next_ver})")
                  ok = False
              elif dev:
                  print(f"Dev pre-release OK: {dev} matches NEXT_VERSION {next_ver}")

          if not ok:
              sys.exit(1)
          EOF

  # ── Python syntax ────────────────────────────────────────────────────────────
  python-syntax:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check ha-addon Python files
        run: |
          python3 - <<'EOF'
          import ast, pathlib, sys
          errors = []
          for f in pathlib.Path("ha-addon/app").rglob("*.py"):
              try:
                  ast.parse(f.read_text())
              except SyntaxError as e:
                  errors.append(f"{f}: {e}")
          if errors:
              print("Syntax errors found:")
              for e in errors:
                  print(f"  {e}")
              sys.exit(1)
          print(f"All {len(list(pathlib.Path('ha-addon/app').rglob('*.py')))} Python files OK")
          EOF

      - name: Check backend Python files
        run: |
          python3 - <<'EOF'
          import ast, pathlib, sys
          errors = []
          for f in pathlib.Path("backend/app").rglob("*.py"):
              try:
                  ast.parse(f.read_text())
              except SyntaxError as e:
                  errors.append(f"{f}: {e}")
          if errors:
              print("Syntax errors found:")
              for e in errors:
                  print(f"  {e}")
              sys.exit(1)
          print(f"All {len(list(pathlib.Path('backend/app').rglob('*.py')))} Python files OK")
          EOF

  # ── Unit tests ───────────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: [python-syntax]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            ha-addon/requirements.txt
            ha-addon/requirements-test.txt
            backend/requirements.txt
            backend/requirements-test.txt

      - name: Install ha-addon dependencies
        run: pip install -r ha-addon/requirements.txt -r ha-addon/requirements-test.txt

      - name: Run ha-addon tests
        working-directory: ha-addon
        run: python -m pytest tests/ -v --tb=short

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt -r backend/requirements-test.txt

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest tests/ -v --tb=short

  # ── Frontend build ───────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build (type-check + bundle)
        working-directory: frontend
        run: npm run build

  # ── Docker build test (amd64 only, no push) ──────────────────────────────────
  build-test:
    name: Docker build test (amd64)
    runs-on: ubuntu-latest
    needs: [lint, python-syntax, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build addon image (no push)
        uses: docker/build-push-action@v7
        with:
          context: ha-addon
          push: false
          platforms: linux/amd64
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/amd64-base-python:3.12-alpine3.20
          tags: health-recorder-ha:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
