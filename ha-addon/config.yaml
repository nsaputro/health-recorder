name: "Health Recorder (dev)"
description: >-
  [DEV CHANNEL] Track body weight, lab results (cholesterol, glucose, uric acid),
  blood pressure, and heart rate with optional Google Fit & Sheets sync.
version: "0.2.0"
slug: "health_recorder_dev"
homeassistant: "2024.1.0"
url: "https://github.com/nsaputro/health-recorder"
# Pre-built images — HA substitutes {arch} (amd64, aarch64)
image: "ghcr.io/nsaputro/health-recorder/{arch}-health_recorder"
arch:
  - aarch64
  - amd64
init: false

# Ingress — shows in HA sidebar
ingress: true
ingress_port: 8099
panel_icon: "mdi:heart-pulse"
panel_title: "Health (dev)"

# Direct port — different from stable (8099) to allow both to run simultaneously
ports:
  8099/tcp: 8100
ports_description:
  8099/tcp: "Dev Web UI & Google OAuth callback (http://<ha-ip>:8100)"

# User-configurable options
options:
  google_client_id: ""
  google_client_secret: ""
  google_redirect_uri: ""

schema:
  google_client_id: str
  google_client_secret: str
  google_redirect_uri: str
